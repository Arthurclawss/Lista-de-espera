<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista de Espera por Dia</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: 'Segoe UI', sans-serif;
      background-color: #1a1a1a;
      color: white;
    }

    h1 {
      text-align: center;
      color: #00ffff;
      margin-bottom: 40px;
    }

    .dias {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .dia {
      background-color: #2e2e2e;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 8px #444;
    }

    .dia h3 {
      margin-top: 0;
      color: #00ffff;
      text-align: center;
    }

    .lista {
      margin-top: 15px;
    }

    .entrada {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #444;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .horario {
      font-weight: bold;
      color: #00ffff;
      width: 60px;
    }

    .nome {
      flex: 1;
      margin-left: 10px;
      text-align: left;
    }

    .remove {
      background: none;
      border: none;
      color: #ff6666;
      font-size: 18px;
      cursor: pointer;
    }

    .remove:hover {
      color: red;
    }

    .add-btn {
      width: 100%;
      margin-top: 12px;
      background-color: green;
      color: white;
      font-weight: bold;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .add-btn:hover {
      background-color: #0b802e;
    }
  </style>
</head>
<body>

  <h1>Lista de Espera por Dia</h1>

  <div class="dias">
    <div class="dia">
      <h3>Segunda</h3>
      <div class="lista" id="lista-segunda"></div>
      <button class="add-btn" onclick="adicionar('lista-segunda')">Adicionar</button>
    </div>
    <div class="dia">
      <h3>Terça</h3>
      <div class="lista" id="lista-terca"></div>
      <button class="add-btn" onclick="adicionar('lista-terca')">Adicionar</button>
    </div>
    <div class="dia">
      <h3>Quarta</h3>
      <div class="lista" id="lista-quarta"></div>
      <button class="add-btn" onclick="adicionar('lista-quarta')">Adicionar</button>
    </div>
    <div class="dia">
      <h3>Quinta</h3>
      <div class="lista" id="lista-quinta"></div>
      <button class="add-btn" onclick="adicionar('lista-quinta')">Adicionar</button>
    </div>
    <div class="dia">
      <h3>Sexta</h3>
      <div class="lista" id="lista-sexta"></div>
      <button class="add-btn" onclick="adicionar('lista-sexta')">Adicionar</button>
    </div>
    <div class="dia">
      <h3>Sábado</h3>
      <div class="lista" id="lista-sabado"></div>
      <button class="add-btn" onclick="adicionar('lista-sabado')">Adicionar</button>
    </div>
  </div>

  <script>
    function adicionar(idLista) {
      const hora = prompt("Digite o horário (ex: 08:30):");
      const nome = prompt("Digite o nome:");

      if (!hora || !nome) {
        alert("Preencha os dois campos.");
        return;
      }

      const [h, m] = hora.split(":").map(Number);
      if (
        isNaN(h) || isNaN(m) ||
        h < 7 || (h === 7 && m < 30) ||
        h > 18 || m > 59
      ) {
        alert("Horário inválido. Use entre 07:30 e 18:00.");
        return;
      }

      const div = document.createElement("div");
      div.className = "entrada";
      div.innerHTML = `
        <span class="horario">${hora}</span>
        <span class="nome">${nome}</span>
        <button class="remove">❌</button>
      `;

      div.querySelector(".remove").addEventListener("click", () => div.remove());

      document.getElementById(idLista).appendChild(div);
    }
  </script>

</body>
</html>
